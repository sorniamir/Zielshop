<script>
  // ❗ API Key واقعی‌ات را اینجا قرار بده
  "const DEEPAI_API_KEY = "1ae6da3d-a29c-457d-a1d1-e9b52108859e";

  const promptInput = document.getElementById("prompt");
  const imageInput = document.getElementById("imageInput");
  const imageLabel = document.getElementById("imageLabel");
  const resultContainer = document.getElementById("result");
  const generateBtn = document.getElementById("generateBtn");
  const btnIcon = document.getElementById("btnIcon");
  const btnText = document.getElementById("btnText");

  imageInput.addEventListener("change", () => {
    if (imageInput.files && imageInput.files[0]) {
      imageLabel.textContent = imageInput.files[0].name;
    } else {
      imageLabel.textContent = "انتخاب فایل PNG / JPG";
    }
  });

  function setLoading(isLoading) {
    if (isLoading) {
      generateBtn.disabled = true;
      generateBtn.classList.add("opacity-70", "cursor-not-allowed");
      btnIcon.textContent = "⏳";
      btnText.textContent = "در حال ساخت تصویر...";
    } else {
      generateBtn.disabled = false;
      generateBtn.classList.remove("opacity-70", "cursor-not-allowed");
      btnIcon.textContent = "⚡";
      btnText.textContent = "ساخت تصویر با DeepAI";
    }
  }

  function clearResult() {
    resultContainer.innerHTML = "";
    const p = document.createElement("p");
    p.className = "text-[11px] text-slate-500 text-center px-4";
    p.textContent = "بعد از زدن دکمه، تصویر نهایی اینجا نمایش داده می‌شود.";
    resultContainer.appendChild(p);
  }

  async function generate() {
    const prompt = (promptInput.value || "").trim();
    if (!prompt) {
      alert("لطفاً پرامپت را وارد کن.");
      return;
    }
    if (!DEEPAI_API_KEY || DEEPAI_API_KEY === "1ae6da3d-a29c-457d-a1d1-e9b52108859e") {
      alert("لطفاً DEEPAI_API_KEY را داخل کد تنظیم کن.");
      return;
    }

    setLoading(true);
    resultContainer.innerHTML = "";

    const loadingP = document.createElement("p");
    loadingP.className = "text-[11px] text-slate-400 text-center px-4";
    loadingP.textContent = "در حال ارسال به DeepAI و ساخت تصویر...";
    resultContainer.appendChild(loadingP);

    try {
      const formData = new FormData();
      formData.append("text", prompt);

      const response = await fetch("https://api.deepai.org/api/text2img", {
        method: "POST",
        headers: {
          "Api-Key": DEEPAI_API_KEY
        },
        body: formData
      });

      if (!response.ok) {
        const errorText = await response.text();
        console.error("DeepAI error:", errorText);
        throw new Error("DeepAI پاسخ مناسب نداد. وضعیت: " + response.status);
      }

      const data = await response.json();
      const imageUrl = data.output_url;
      if (!imageUrl) {
        throw new Error("خروجی DeepAI فاقد output_url است.");
      }

      resultContainer.innerHTML = "";
      const img = document.createElement("img");
      img.src = imageUrl;
      img.alt = "DeepAI generated image";
      img.className = "w-full h-full object-contain bg-black/80";
      resultContainer.appendChild(img);

    } catch (err) {
      console.error("Generate error:", err);
      resultContainer.innerHTML = "";
      const errorP = document.createElement("p");
      errorP.className = "text-[11px] text-red-400 text-center px-4";
      errorP.textContent =
        "خطا در ساخت تصویر: " + (err?.message || "مشکلی رخ داد.";
      resultContainer.appendChild(errorP);
    } finally {
      setLoading(false);
    }
  }
</script>
